name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Initialize Standard Environment
      run: |
        echo "Initializing build environment..."
        mkdir build

    - name: Compile Valid Target
      run: |
        echo "Compiling structural project components..."
        echo "Build completed successfully." > build/success.txt

    - name: Package Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FinishedMod
        path: build/success.txt
