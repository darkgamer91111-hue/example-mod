name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Developer Environment
      run: |
        curl -LO https://github.com
        tar -xf geode-cli-win.zip
        echo "${{ github.workspace }}" >> $GITHUB_PATH
        
    - name: Initialize Mod Configuration
      run: |
        ./geode profile add --default --sdk 3.0.0-beta.1 dummy-profile
        
    - name: Force Project Package
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
