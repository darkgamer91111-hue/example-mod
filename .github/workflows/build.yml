name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Geode CLI & SDK
      uses: geode-sdk/build-geode-mod@main
      with:
        bindings: geode-sdk/bindings
        combine: true
