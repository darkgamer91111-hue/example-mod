name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      with:
        bindings: geode-sdk/bindings
