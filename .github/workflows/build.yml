name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Pre-configure Geode Environment Layout
      run: |
        curl -LO https://github.com
        tar -xf geode-cli-win.zip
        ./geode profile add --default --sdk "dummy" dummy-profile 2>NUL || true
        echo "${{ github.workspace }}" >> $GITHUB_PATH

    - name: Build Geode Mod Bundle
      uses: geode-sdk/build-geode-mod@main
      with:
        combine: true
