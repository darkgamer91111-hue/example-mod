name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Geode CLI & Build
      uses: geode-sdk/build-geode-mod@main
      id: build-step
      with:
        bindings: geode-sdk/bindings
